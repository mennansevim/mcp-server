# Server bağlantı ayarları
server:
  host: "0.0.0.0"  # Dinlenecek IP adresi
  port: 8000  # Port numarası
  debug: false  # Debug modu
  
# MCP server bilgileri
mcp:
  name: "code-review-server"
  version: "1.0.0"
  description: "AI-powered code review server with platform integration"

# AI sağlayıcı ve model ayarları
ai:
  provider: "groq"  # openai | anthropic | groq
  model: "llama-3.3-70b-versatile"
  # Groq models: llama-3.3-70b-versatile, llama-3.1-70b-versatile, mixtral-8x7b-32768
  # Anthropic: claude-3-5-sonnet-20241022
  # OpenAI: gpt-4-turbo-preview, gpt-4o, gpt-4o-mini
  temperature: 0.3  # Yaratıcılık seviyesi (0.0-1.0)
  max_tokens: 4096  # Maksimum token sayısı

# Platform entegrasyonları (token'lar .env dosyasında)
platforms:
  github:
    enabled: true
    api_url: "https://api.github.com"
  gitlab:
    enabled: true
    api_url: "https://gitlab.com/api/v4"
  bitbucket:
    enabled: true
    api_url: "https://api.bitbucket.org/2.0"
  azure:
    enabled: true
    api_url: "https://dev.azure.com"

# Review stratejisi ve kuralları
review:
  comment_strategy: "summary"  # inline | summary | both - Yorum türü
  detailed_analysis_branches:  # master, main, preprod, production, develop, staging - Detaylı tablo gösterilecek branch'ler
    - master
    - main
    - preprod
    - production
  report_levels:  # critical, high, medium, low, info - Raporlanacak sorun seviyeleri
    - critical
    - high
    - medium
  auto_approve: false  # Sorunsuz PR'ları otomatik onayla
  block_on_critical: true  # Critical sorunlarda merge'ü blokla
  focus:  # compilation, security, performance, bugs, code_quality, best_practices - İncelenecek alanlar
    - compilation
    - security
    - performance
    - bugs
    - code_quality
    - best_practices
  # PR yorum template'i — default | detailed | executive | custom
  template:
    name: "executive"  # Template adı (default | detailed | executive | custom)
    # file: "my_team.md"  # Sadece custom template için: custom_templates/ altındaki dosya
    demo_all: false

# Dinamik kural evrimi — review geri bildirimlerine göre repo bazlı kural üretimi
rule_evolution:
  enabled: true  # Dinamik kural evrimini aktifleştir
  auto_evolve: true  # Her N review'den sonra otomatik tetikle
  trigger_every: 10  # Kaç review'den sonra rule güncellensin
  max_issues_lookback: 200  # Pattern analizi için son kaç issue'a bakılsın
  storage:
    type: "sqlite"  # sqlite — review verisi depolama
    path: "data/reviews.db"  # SQLite veritabanı yolu

# OWASP Top 10 otomatik güncelleme
owasp:
  auto_update: true  # Sunucu başlangıcında ve periyodik güncelleme
  update_interval_days: 7  # Güncelleme periyodu (gün)
  source: "github"  # github — OWASP/Top10 reposundan çek
  github_repo: "OWASP/Top10"  # Kaynak GitHub reposu

# Webhook güvenlik ve timeout ayarları
webhook:
  verify_signature: true  # Webhook imzasını doğrula
  timeout: 300  # Review timeout (saniye)

# Log ayarları
logging:
  level: "INFO"  # DEBUG | INFO | WARNING | ERROR
  format: "json"  # json | console

# UI canlı log dashboard ayarları
ui:
  logs:
    poll_interval_seconds: 3  # 1-30 arası polling interval
    max_events_per_poll: 200  # 20-500 arası event limiti
