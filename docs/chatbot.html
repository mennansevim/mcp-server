<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP Code Review — AI Asistan</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        body {
            background: #06060b;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .bg {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: 0;
        }

        .bg .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.35;
        }

        .bg .orb-1 {
            width: 500px;
            height: 500px;
            background: #4f46e5;
            top: -10%;
            left: -5%;
            animation: drift1 20s ease-in-out infinite;
        }

        .bg .orb-2 {
            width: 400px;
            height: 400px;
            background: #7c3aed;
            bottom: -8%;
            right: -3%;
            animation: drift2 25s ease-in-out infinite;
        }

        .bg .orb-3 {
            width: 250px;
            height: 250px;
            background: #2563eb;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: drift3 18s ease-in-out infinite;
        }

        .bg .grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        @keyframes drift1 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(40px, 30px); }
        }

        @keyframes drift2 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-30px, -40px); }
        }

        @keyframes drift3 {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.2); }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 80%;
            height: 85%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 4px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: white;
            font-weight: 700;
        }

        .logo h1 {
            font-size: 16px;
            font-weight: 600;
            color: #e0e0e0;
            letter-spacing: -0.3px;
        }

        .logo h1 span { color: #818cf8; }

        .badge {
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 12px;
            background: rgba(99, 102, 241, 0.12);
            color: #818cf8;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .meta {
            font-size: 12px;
            color: #555;
        }

        .meta a {
            color: #6366f1;
            text-decoration: none;
        }

        .chat-frame {
            flex: 1;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.03),
                0 20px 60px rgba(0,0,0,0.5),
                0 0 80px rgba(99, 102, 241, 0.06);
        }

        .chat-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="grid"></div>
    </div>

    <div class="container">
        <div class="top-bar">
            <div class="logo">
                <div class="logo-icon">M</div>
                <h1><span>MCP</span> Code Review</h1>
                <span class="badge">AI Asistan</span>
            </div>
            <div class="meta">
                Mennan Sevim &middot;
                <a href="https://github.com/mennansevim/mcp-server" target="_blank">GitHub</a>
            </div>
        </div>

        <div class="chat-frame">
            <iframe
                src="https://chat.agoravoice.com.tr/chatbot/j9aOuCp4IBnDgW7s?theme=dark"
                title="MCP Code Review AI Asistan"
                sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads allow-presentation"
                allow="microphone">
            </iframe>
        </div>
    </div>
</body>
</html>
